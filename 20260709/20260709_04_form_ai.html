<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Bootstrap 5 綜合表單</h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="#" method="POST">

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="inputText" class="form-label">文字輸入框 (Text)</label>
                                    <input type="text" class="form-control" id="inputText" placeholder="請輸入姓名或文字"
                                        required>
                                </div>
                                <div class="col-md-6">
                                    <label for="inputNumber" class="form-label">數字輸入框 (Number)</label>
                                    <input type="number" class="form-control" id="inputNumber" placeholder="請輸入年齡"
                                        min="0" max="150">
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="inputDate" class="form-label">日期選擇器 (Date)</label>
                                    <input type="date" class="form-control" id="inputDate">
                                </div>
                                <div class="col-md-6">
                                    <label for="inputSelect" class="form-label">下拉選單 (Select)</label>
                                    <select class="form-select" id="inputSelect">
                                        <option selected disabled value="">請選擇一個選項...</option>
                                        <option value="1">選項一</option>
                                        <option value="2">選項二</option>
                                        <option value="3">選項三</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label d-block">單選按鈕 (Radio)</label>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="inlineRadioOptions"
                                            id="radio1" value="option1" checked>
                                        <label class="form-check-label" for="radio1">男生</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="inlineRadioOptions"
                                            id="radio2" value="option2">
                                        <label class="form-check-label" for="radio2">女生</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label d-block">複選框 (Checkbox)</label>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="checkbox" id="inlineCheckbox1"
                                            value="option1">
                                        <label class="form-check-label" for="inlineCheckbox1">讀書</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="checkbox" id="inlineCheckbox2"
                                            value="option2">
                                        <label class="form-check-label" for="inlineCheckbox2">運動</label>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="inputFile" class="form-label">檔案上傳 (File)</label>
                                <input class="form-control" type="file" id="inputFile">
                            </div>

                            <div class="mb-4">
                                <label for="labelTextarea" class="form-label">大型文字方塊 (Textarea)</label>
                                <textarea class="form-control" id="labelTextarea" rows="3"
                                    placeholder="請輸入您的意見或備註..."></textarea>
                            </div>

                            <hr class="my-4">

                            <div class="d-flex justify-content-end gap-2">
                                <button type="reset" class="btn btn-outline-secondary">重設 (Reset)</button>

                                <button type="button" class="btn btn-info text-white" onclick="alert('你點擊了一般按鈕！')">一般按鈕
                                    (Button)</button>

                                <button type="submit" class="btn btn-primary">送出表單 (Submit)</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
