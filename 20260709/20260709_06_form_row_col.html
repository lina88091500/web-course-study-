<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container mt-3">
        <h2>Stacked form</h2>
        <!-- input text / number / date / radio / checkbox / select / file /  textarea / reset / button / submit  -->
        <form action="/action_page.php">
            <div class="row">
                <div class="col-12 col-sm-6">
                    <!-- text -->
                    <div class="mb-3 mt-3">
                        <label for="name">Name:</label>
                        <input type="text" class="form-control" id="name" placeholder="Enter name" name="name">
                    </div>
                </div>
                <div class="col-12 col-sm-6">
                    <!-- number -->
                    <div class="mb-3 mt-3">
                        <label for="name">Lucky Number:</label>
                        <input type="number" class="form-control" id="name" placeholder="Enter name" name="name">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <!-- date -->
                    <div class="mb-3 mt-3">
                        <label for="name">Lucky Date:</label>
                        <input type="date" class="form-control" id="name" placeholder="Enter name" name="name">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12 col-sm-6">
                    <!-- radio -->
                    <label for="sel1" class="form-label">Radio list (select one):</label>
                    <div class="form-check">
                        <input type="radio" class="form-check-input" id="radio1" name="optradio" value="option1"
                            checked>
                        <label class="form-check-label" for="radio1">Option 1</label>
                    </div>
                    <div class="form-check">
                        <input type="radio" class="form-check-input" id="radio2" name="optradio" value="option2">
                        <label class="form-check-label" for="radio2">Option 2</label>
                    </div>
                    <div class="form-check">
                        <input type="radio" class="form-check-input" disabled>
                        <label class="form-check-label">Option 3</label>
                    </div>
                </div>


                <div class="col-12 col-sm-6">
                    <!-- checkbox -->
                    <label for="sel1" class="form-label">CheckBox list (select):</label>
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="check1" name="option1" value="something"
                            checked>
                        <label class="form-check-label" for="check1">Option 1</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="check2" name="option2" value="something">
                        <label class="form-check-label" for="check2">Option 2</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" disabled>
                        <label class="form-check-label">Option 3</label>
                    </div>
                </div>
            </div>


            <div class="row">
                <div class="col">
                    <!-- select -->
                    <label for="sel1" class="form-label">Select list (select one):</label>
                    <select class="form-select" id="sel1" name="sellist1">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <!-- file -->
                    <div class="mb-3 mt-3">
                        <label for="file">File:</label>
                        <input type="file" class="form-control" id="file" placeholder="Enter name" name="name">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <!-- textarea -->
                    <div class="mb-3 mt-3">
                        <label for="comment">Comments:</label>
                        <textarea class="form-control" rows="5" id="comment" name="text"></textarea>
                    </div>
                </div>
            </div>


            <div class="row">
                <div class="col">
                    <button type="reset" class="btn btn-primary">Reset</button>
                </div>
                <div class="col">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </div>
        </form>
    </div>

</body>

</html>
