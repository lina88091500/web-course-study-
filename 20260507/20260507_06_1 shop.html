<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
     <style>
          table {
               width: 80%;
               margin: auto;

          }

          table,
          th,
          td {
               border: 1px solid black;
               border-collapse: collapse;
               text-align: center;
          }

          table img {
               width: 100px;
               height: auto;
               display: block;
               margin: auto;
          }

          .count {
               width: 80%;
          }

          .total {
               width: 90%;
          }


          .result {
               height: 15vh;
               border-top: 0px;
          }

          .result-table {
               border-top: 0;
          }

          h2 {
               text-align: center;
               color: lightcoral;
          }

          th {
               background-color: lightblue;
          }
     </style>
</head>

<body>
     <h2>永和豆漿大王</h2>
     <table>
          <tr>
               <th width="10%">
                    品項
               </th>
               <th width="10%">
                    價格
               </th>
               <th width="10%">
                    數量
               </th>
               <th width="20%">
                    小計
               </th>
               <th>
                    備註
               </th>
          </tr>

          <tr>
               <td>
                    <img src="img/豆漿.jpg">
                    豆漿(大杯)
               </td>
               <td>25</td>
               <td>2</td>
               <td>50</td>
               <td>去冰</td>
          </tr>

          <tr>
               <td>
                    <img src="./img/蛋餅.jpg">
                    原味蛋餅
               </td>
               <td>30</td>
               <td>1</td>
               <td>30</td>
               <td>酥一點、小辣</td>
          </tr>

          <tr>
               <td>
                    <img src="./img/飯糰.jpg">
                    飯糰
               </td>
               <td>35</td>
               <td>1</td>
               <td>35</td>
               <td>不要菜脯</td>
          </tr>

          <tr>
               <td>
                    <img src="./img/燒餅.tw">
                    燒餅
               </td>
               <td>25</td>
               <td>1</td>
               <td>25</td>
               <td></td>
          </tr>

          <tr>
               <td>
                    <img src="./img/油條.jpg">
                    油條
               </td>
               <td>20</td>
               <td>0</td>
               <td>0</td>
               <td></td>
          </tr>

     </table>
     </table>
     <!-- <br> -->
     <table class="result-table">
          <tr>
               <td class="result">
                    總金額:140，謝謝惠顧!
               </td>
          </tr>
     </table>

</body>

</html>
