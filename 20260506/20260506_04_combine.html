<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* .s1~ div 少用 {
            color: red;
        } */

        /* ~ 同層全部 少用*/
        /* + 下一個兄弟姊妹層 */
         .s2+ div {
            color: red;
        }


        /* .s1~ .s2{
            color: green;
        } */
    </style>
</head>

<body>

    <div class="s1">
        劉備
    </div>

    <div class="s2">
        關羽
    </div>

    <div class="s3">
        張飛
    </div>

</body>

</html>
