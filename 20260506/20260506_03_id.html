        /* id 權重 > class */



        .box {
            width: 300px;
            height: 300px;
            background-color: lightblue;
        }

        .box-pink {
            background-color: lightpink;
        }

        /* id 獨一無二 */
        /* class 可以多選 */

        h1 {
            color: lightblue;
            text-align: center;
        }
    </style>

</head>

<body>

    <h1>let it go</h1>

    <!-- div 空 -->

    <div class="box box-pink" id="box1">

    </div>

    <br>
    <!-- div 空 -->
    <div class="box" id="box2">

    </div>

</body>
