<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* , 多選 */
        table,
        tr,
        td {
            /* border: 1px solid black; */
            border-collapse: collapse;
        }

        table {
            width: 80%;
            text-align: center;
            margin: auto;
            margin-bottom: 30px;
        }

        /* vh viwepint height*/
        /* 使用者螢幕大小 25h 25% */
        td {
            height: 100vh;
        }

        .box {
            width: 100%;
            height: 100%;
            /* background-color: lightblue; */
        }

        .box11 {
            background-color: lightblue;
        }

        .box21 {
            background-color: lightpink;
        }

        .box22 {
            background-color: lightyellow;
        }


        .box31 {
            background-color: lightyellow;
        }

        .box32 {
            background-color: lightcyan;
        }

        .box33 {
            background-color: lightsalmon;
        }

        .box41 {
            background-color: lightgray;
        }

        .box42 {
            background-color: lightcoral;
        }

        .box43 {
            background-color: lightskyblue;
        }

        .box44 {
            background-color: lightyellow;
        }
    </style>
</head>

<body>
    <table>
        <!-- 11 -->
        <tr>
            <td>
                <div class="box box11">

                </div>
            </td>
        </tr>
        <!-- 21 22 -->
    </table>

    <table>
        <tr>
            <td>
                <div class="box box21">

                </div>
            </td>
            <td>
                <div class="box box22">

                </div>
            </td>
        </tr>
    </table>

    <table>
        <tr>
            <td width="20%">
                <div class="box box31">
                    Lorem ipsum dolor sit amet. 20
                </div>
            </td>
            <td width="60%">
                <div class="box box32">
                    Lorem ipsum dolor sit amet. 60
                </div>
            </td>
            <td width="40%">
                <div class="box box33">
                    Lorem ipsum dolor sit amet. 20
                </div>
            </td>
        </tr>
    </table>


    <table>
        <tr>
            <td>
                <div class="box box41">

                </div>
            </td>
            <td>
                <div class="box box42">

                </div>
            </td>
            <td>
                <div class="box box43">

                </div>
            </td>
            <td>
                <div class="box box44">

                </div>
            </td>
        </tr>
    </table>



</body>

</html>
