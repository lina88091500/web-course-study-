<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Photo Grid</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
        }

        /* 🖥️ 電腦版預設：一整大包容器，寬度不夠時自動換行 */
        .container {
            display: flex;
            flex-wrap: wrap; 
            gap: 16px; /* 圖片之間的間隙 */
        }

        /* 每一張照片的容器 .box */
        .box {
            /* 關鍵：calc(33.33% - 11px) 讓它在扣掉間隙後，剛好平分 3 等份（一排 3 張） */
            width: calc(33.33% - 11px); 
            height: 250px;
            border-radius: 90px;
            overflow: hidden;
            background-color: #ddd;
        }

        .box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓圖片填滿盒子不變形 */
        }

        /* 📱 手機版：當螢幕寬度小於 768px 時 */
        @media (max-width: 768px) {
            .box {
                /* 強制把寬度改成 100%（一排只剩 1 張，變成垂直直列式） */
                width: 100%; 
                height: 200px; /* 手機上稍微縮小一點高度 */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box"><img src="https://picsum.photos/600/400?random=1" alt="photo"></div>
        <div class="box"><img src="https://picsum.photos/600/400?random=2" alt="photo"></div>
        <div class="box"><img src="https://picsum.photos/600/400?random=3" alt="photo"></div>
        <div class="box"><img src="https://picsum.photos/600/400?random=4" alt="photo"></div>
        <div class="box"><img src="https://picsum.photos/600/400?random=5" alt="photo"></div>
        <div class="box"><img src="https://picsum.photos/600/400?random=6" alt="photo"></div>
    </div>

</body>
</html>
