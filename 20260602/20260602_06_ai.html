<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Layout with Animation</title>
    <style>
        /* 💡 獨立出來的動畫方塊，使用特定的 class 避免污染排版 */
        .moving-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 100px;
            background-color: rgba(173, 216, 230, 0.8);
            border-radius: 6px;
            z-index: 2;
            pointer-events: none;
            animation: myAnimation 10s linear infinite;
        }

        .moving-box-1 {
            position: absolute;
            top: 200px;
            left: 0px;
            width: 80px;
            height: 80px;
            background-color: rgba(237, 195, 255, 0.8);
            border-radius: 10px;
            z-index: 5;
            pointer-events: none;
            animation: myAnimation 10s linear infinite;
        }

        @keyframes myAnimation {

            0%,
            100% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(calc(100vw - 100px), 0);
            }

            50% {
                transform: translate(calc(100vw - 100px), calc(100vh - 100px));
            }

            75% {
                transform: translate(0, calc(100vh - 100px));
            }
        }
    </style>
</head>

<body>


    <div class="moving-box"></div>
    <div class="moving-box-1"></div>

</body>

</html>
