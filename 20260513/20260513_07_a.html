<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
     <style>
          * {
               box-sizing: border-box;
          }

          .box {
               width: 100;
               height: 100vh;
               background-color: beige;
               padding-top: 20px;
               text-align: center;
          }

          a {
               display: inline-block;
               width: 80%;
               height: 150px;
               background-color: aquamarine;
               margin-top: 20px;
          }

          table {
               width: 100%;
               margin: auto;
          }

          .main {
               width: 100%;
               height: 100vh;
               background-color: beige;
          }
     </style>
</head>
<body>
     <table>
          <tr>
               <td width="20%">
                    <div class="box">
                         <a href="">linkA</a>
                         <a href="">linkB</a>
                         <a href="">linkC</a>
                         <a href="">linkD</a>
                    </div>
               </td>
          </tr>
     </table>
</body>
</html>
