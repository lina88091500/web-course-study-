<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
     <style>
          * {
               box-sizing: border-box;
          }
          .box {
               width: 500px;
               height: 135px;
               background-color: lightgoldenrodyellow;

               /* 往外推 */
               margin-top: 50px;
               margin-left: 50px;

               /* 往內推 */
               padding-top: 30px;
               padding-left: 30px;

               /* --- 文字排版核心 --- */
               font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
               /* 設定字體 */
               font-size: 16px;
               /* 字體大小 */
               line-height: 1.6;
               /* 行高：1.6倍 */
               color: #444;
               /* 深灰色比純黑色更高級 */
               text-align: justify;
               /* 兩端對齊 */
               letter-spacing: 0.5px;
               /* 字距：增加一點點呼吸感 */

          }
          
     </style>
</head>

<body>
     <div class="box">
          Lorem ipsum dolor sit amet consectetur adipisicing elit.<br>
          Nihil possimus, error dolores nostrum quisquam ea<br>
          consequuntur eligendi! Nobis, ipsam minima!<br>
     </div>

</body>

</html>
