<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>

     <h3>Table 九宮格創建練習</h3>

     <style>
          table,
          th,
          td {
               border: 1px solid black;
               border-collapse: collapse;
          }

          table {
               width: 80%;
               text-align: center;
               margin: auto;
          }
     </style>

</head>



<body>
     <table>
          <tr>
               <td colspan="2">
                    1
               </td>
               <!-- <td>2</td> -->
               <td>3</td>
          </tr>
          <tr>
               <td>4</td>
               <td>5</td>
               <td rowspan="2">
                    6
               </td>
          </tr>
          <tr>
               <td>7</td>
               <td>8</td>
               <!-- <td>9</td> -->
          </tr>
     </table>

</body>

</html>
