<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 80%;
            /* height: 800px; */
            background-color: lightblue;
            margin: auto;

            /* flex */
            /* 宣告flex */
            display: flex;
            /* 水平分散 */
            justify-content: space-around;
            /* 水平置中 */
            /* justify-content: center; */
            /* 垂直置中 */
            align-items: center;
            flex-wrap: wrap;

        }

        .item {
            width: 400px;
            height: 300px;
            background-color: #ccc;
            margin-left: 10px;
            margin-right: 10px;
            margin-top: 50px;
        }

        /* display none 不見 */
        /* opacity 透明度 0 */
        .item-hidden{
            /* display: none; */
            opacity: 0;

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item">

        </div>
        <div class="item">

        </div>
        <div class="item">

        </div>
        <div class="item">

        </div>
        <div class="item">

        </div>
        <div class="item">

        </div>

        <div class="item">

        </div>
        <div class="item">

        </div>
        
        <div class="item item-hidden">

        </div>
    </div>
</body>

</html>
